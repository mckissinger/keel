name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The verified-pin gate keel ships to projects — prove it still behaves.
      - name: verified-pin gate self-test
        run: bash scripts/check-verified-pin.test.sh

      # The stack-neutral guard for keel's own corpus + its self-test.
      - name: neutrality guard self-test
        run: bash scripts/check-neutral.test.sh
      - name: neutrality guard (this repo)
        run: bash scripts/check-neutral.sh

      # The session/merge/branch hook guards keel ships to projects — prove they still behave.
      - name: session bootstrap self-test
        run: bash scripts/session-bootstrap.test.sh
      - name: merge guard self-test
        run: bash scripts/merge-guard.test.sh
      - name: branch rules guard self-test
        run: bash scripts/guard-branch-rules.test.sh

      # The plan lint keel ships to projects — prove it, and lint keel's own specs.
      - name: plan lint self-test
        run: bash scripts/check-plan.test.sh
      - name: plan lint (this repo)
        run: bash scripts/check-plan.sh

      # Plugin manifest/structure validation via the Claude Code CLI.
      - name: install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: plugin validate
        run: claude plugin validate --strict .

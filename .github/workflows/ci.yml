name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The verified-pin gate keel ships to projects — prove it still behaves.
      - name: verified-pin gate self-test
        run: bash scripts/check-verified-pin.test.sh

      # The stack-neutral guard for keel's own corpus + its self-test.
      - name: neutrality guard self-test
        run: bash scripts/check-neutral.test.sh
      - name: neutrality guard (this repo)
        run: bash scripts/check-neutral.sh

      # The git hooks keel ships to projects — prove they still behave.
      - name: session bootstrap hook self-test
        run: bash scripts/session-bootstrap.test.sh
      - name: merge guard hook self-test
        run: bash scripts/merge-guard.test.sh
      - name: branch-rules guard hook self-test
        run: bash scripts/guard-branch-rules.test.sh
      - name: attended-marker cross-script parity self-test
        run: bash scripts/attended-marker-parity.test.sh

      # The auto-run entry preflight keel ships to projects — prove it, incl. the
      # allow_auto_merge assertion (check d).
      - name: auto preflight self-test
        run: bash scripts/check-auto-preflight.test.sh

      # The plan lint keel ships to projects — prove it, and lint keel's own specs.
      - name: plan lint self-test
        run: bash scripts/check-plan.test.sh
      - name: plan lint (this repo)
        run: bash scripts/check-plan.sh

      # The skill-frontmatter lint keel ships to projects — prove it, and lint keel's own skills.
      - name: skill frontmatter lint self-test
        run: bash scripts/check-skill-frontmatter.test.sh
      - name: skill frontmatter lint (this repo)
        run: bash scripts/check-skill-frontmatter.sh

      # Plugin manifest/structure validation via the Claude Code CLI.
      - name: install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: plugin validate
        run: claude plugin validate --strict .
